version: "3.9"

services:
  aas-registry:
    image: eclipsebasyx/aas-registry-log-mem:2.0.0-SNAPSHOT
    container_name: aas-registry
    ports:
      - "8083:8080"

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mem:2.0.0-SNAPSHOT
    container_name: submodel-registry
    ports:
      - "8084:8080"

  supplierA-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: supplierA-env
    ports:
      - "8091:8081"
    volumes:
      - ./supplierA/application.properties:/application/application.properties

  supplierB-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: supplierB-env
    ports:
      - "8092:8081"
    volumes:
      - ./supplierB/application.properties:/application/application.properties

  supplierC-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: supplierC-env
    ports:
      - "8093:8081"
    volumes:
      - ./supplierC/application.properties:/application/application.properties

  supplierD-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: supplierD-env
    ports:
      - "8094:8081"
    volumes:
      - ./supplierD/application.properties:/application/application.properties

  supplierE-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: supplierE-env
    ports:
      - "8095:8081"
    volumes:
      - ./supplierE/application.properties:/application/application.properties

  semantic-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: semantic-env
    ports:
      - "8090:8081"
    volumes:
      - ./semantic/application.properties:/application/application.properties

  gateway:
    image: nginx:alpine
    container_name: basyx-gateway
    depends_on:
      - supplierA-env
      - supplierB-env
      - supplierC-env
      - supplierD-env
      - supplierE-env
      - semantic-env
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
